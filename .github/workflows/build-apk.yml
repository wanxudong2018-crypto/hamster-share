name: Build APK

on:
  push:
    paths:
      - 'android-share-app/**'
  pull_request:
    paths:
      - 'android-share-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-share-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/仓鼠快传 V${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hamster-share-debug-apk
          path: android-share-app/app/build/outputs/apk/debug/仓鼠快传 V*.apk

      - name: Upload APK to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 仓鼠快传
          files: android-share-app/app/build/outputs/apk/debug/仓鼠快传 V*.apk
          body: 仓鼠快传最新版 APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
