<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓鼠快传 Android 预览（紧凑版）</title>
    <style>
        :root {
            --blue: #5A85D0;
            --blue-light: #B9C9EC;
            --panel: #EAF0FB;
            --line: #DDE8FF;
            --input: #F3F5F9;
            --text: #111111;
            --sub: #8A8F99;
            --cyan: #65C4EF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #080808;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            padding: 24px;
            color: var(--text);
        }

        .workspace {
            display: grid;
            grid-template-columns: 390px 260px;
            gap: 24px;
            align-items: start;
        }

        .phone {
            width: 390px;
            height: 844px;
            background: linear-gradient(180deg, #5AD095 0%, #EDF0FB 100%);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .hero {
            min-height: 320px;
            padding: 32px 24px 24px;
            color: #FFFFFF;
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-img {
            width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .brand-desc {
            font-size: 15px;
            margin-top: 10px;
            opacity: 0.88;
        }

        .upload-frame {
            height: 250px;
            background: url('android-share-app/%E4%B8%8A%E4%BC%A0%E8%83%8C%E6%99%AF.png') center / 100% 100% no-repeat;
            position: relative;
        }

        .upload-inner {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .folder {
            width: 64px;
            height: 64px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .folder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .upload-title {
            font-size: 15px;
            font-weight: normal;
            line-height: normal;
            text-align: center;
            white-space: pre-line;
            color: #1A1A2E;
        }

        .original-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            color: #1A1A2E;
            opacity: 0.85;
            font-size: 13px;
            font-weight: 500;
        }

        .check {
            width: 16px;
            height: 16px;
            border: 2px solid #9AA0A6;
            border-radius: 6px;
            background: #FFFFFF;
        }

        .progress {
            display: none;
            width: 260px;
            height: 6px;
            border-radius: 999px;
            background: #C9D7F1;
            overflow: hidden;
            margin-top: 16px;
        }

        .progress-fill {
            width: 45%;
            height: 100%;
            border-radius: inherit;
            background: #52C41A;
        }

        .bottom {
            margin-top: 0;
            flex: 1;
            background: #FFFFFF;
            border-radius: 24px 24px 0 0;
            padding: 24px 24px 28px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 900;
        }

        .guide {
            font-size: 14px;
            color: #5A6B8A;
        }

        .url-box {
            width: 100%;
            min-height: 100px;
            border: none;
            resize: none;
            outline: none;
            border-radius: 18px;
            background: var(--input);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            padding: 16px;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .url-box::placeholder {
            color: #9A9A9A;
            opacity: 1;
        }

        .black-btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: #111111;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 900;
        }

        .member-btn {
            display: none;
            width: 176px;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: #111111;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 800;
            margin-top: 16px;
        }

        .quota .folder {
            margin-bottom: 12px;
        }

        .quota .upload-title {
            min-height: 40px;
            font-size: 14px;
            font-weight: normal;
            line-height: 1.45;
        }

        .quota .member-btn {
            display: block;
        }

        .uploading .original-row,
        .success .original-row,
        .quota .original-row,
        .error .original-row,
        .unbound .original-row {
            display: none;
        }

        .uploading .progress,
        .success .progress,
        .quota .progress {
            display: block;
        }

        .success .progress-fill {
            width: 100%;
        }

        .quota .progress,
        .error .progress {
            display: none;
        }

        .controls {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 18px;
        }

        .picker-sheet {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #FFFFFF;
            border-radius: 28px 28px 0 0;
            padding: 12px 24px 28px;
            box-shadow: 0 -8px 24px rgba(17, 17, 17, 0.08);
        }

        .picker-close {
            width: 40px;
            height: 40px;
            margin-left: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #222222;
        }

        .picker-row {
            display: flex;
            gap: 16px;
            padding-top: 8px;
        }

        .picker-option {
            width: 88px;
            text-align: center;
        }

        .picker-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto;
            border-radius: 18px;
            background: #F3F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #1A1A2E;
        }

        .picker-option.album .picker-icon {
            color: var(--blue);
        }

        .picker-label {
            margin-top: 10px;
            font-size: 14px;
            color: #5A6B8A;
        }

        .controls h2 {
            font-size: 16px;
            margin-bottom: 14px;
        }

        .state-btn {
            width: 100%;
            height: 42px;
            border: 1px solid #DDE2EA;
            border-radius: 10px;
            background: #FFFFFF;
            color: var(--text);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .state-btn.active {
            border-color: var(--blue);
            background: #EEF3FF;
            color: var(--blue);
        }

        .note {
            margin-top: 10px;
            color: var(--sub);
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 760px) {
            .workspace {
                grid-template-columns: 1fr;
            }

            .phone {
                width: min(390px, calc(100vw - 32px));
            }
        }
    </style>
</head>
<body>
    <main class="workspace">
        <section class="phone" id="phone">
            <div class="hero">
                <div class="brand">
                    <img class="brand-img" src="eagle-mobile-upload%20%E4%BA%91%E7%AB%AF/Eagle.png" alt="仓鼠快传 Send to Eagle">
                    <div class="brand-desc">即刻将图片无线快传至 Eagle</div>
                </div>
                <div class="upload-frame" id="uploadFrame">
                    <div class="upload-inner">
                        <div class="folder">
                            <img src="android-share-app/%E4%B8%8A%E4%BC%A0%E5%9B%BE%E6%A0%87.png" alt="上传图标">
                        </div>
                        <div class="upload-title" id="uploadTitle">点击选择或拍摄图片/视频</div>
                        <div class="original-row">
                            <span class="check"></span>
                            <span>上传原图</span>
                        </div>
                        <div class="progress">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <button class="member-btn" id="memberBtn">激活永久会员</button>
                    </div>
                </div>
            </div>

            <div class="bottom">
                <div class="section-head">
                    <div class="section-title">绑定插件地址</div>
                    <div class="guide">视频引导</div>
                </div>
                <textarea class="url-box" id="urlBox" placeholder="打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。"></textarea>
                <button class="black-btn" id="bindBtn">绑定电脑端插件</button>
            </div>

            <div class="picker-sheet" id="pickerSheet">
                <div class="picker-close" id="pickerClose">×</div>
                <div class="picker-row">
                    <div class="picker-option">
                        <div class="picker-icon">📷</div>
                        <div class="picker-label">相机</div>
                    </div>
                    <div class="picker-option album">
                        <div class="picker-icon">🖼</div>
                        <div class="picker-label">相册</div>
                    </div>
                    <div class="picker-option">
                        <div class="picker-icon">📁</div>
                        <div class="picker-label">文件</div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="controls">
            <h2>预览状态</h2>
            <button class="state-btn active" data-state="idle">默认/绑定入口</button>
            <button class="state-btn" data-state="uploading">正在上传</button>
            <button class="state-btn" data-state="success">上传成功</button>
            <button class="state-btn" data-state="quota">额度用完</button>
            <button class="state-btn" data-state="error">上传失败</button>
            <button class="state-btn" data-state="unbound">未绑定</button>
            <button class="state-btn" id="pickerToggle">底部入口预览</button>
            <p class="note">这个页面用于预览 APK 的视觉结构：顶部上传框展示状态，底部固定绑定入口。</p>
        </aside>
    </main>

    <script>
        const sampleBoundUrl = 'https://figma-me-review-dxzmljpjyo.cn-hangzhou.fcapp.run/api/upload?sid=eagle_demo_123456&t=8f3c7d2a9b1e4f6c&client=eagle';

        const states = {
            idle: {
                title: '点击选择或拍摄图片/视频',
                cls: '',
                progress: '0%',
                url: sampleBoundUrl,
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '断开连接',
                hideUpload: false
            },
            uploading: {
                title: '正在上传 12/24',
                cls: 'uploading',
                progress: '45%',
                url: sampleBoundUrl,
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '断开连接',
                hideUpload: false
            },
            success: {
                title: '全部上传成功（共 24 张）',
                cls: 'success',
                progress: '100%',
                url: sampleBoundUrl,
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '断开连接',
                hideUpload: false
            },
            quota: {
                title: '今日免费额度已用完\n激活永久会员后可继续上传',
                cls: 'quota',
                progress: '100%',
                url: sampleBoundUrl,
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '断开连接',
                hideUpload: false
            },
            error: {
                title: '第 1 张上传失败：网络错误',
                cls: 'error',
                progress: '100%',
                url: sampleBoundUrl,
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '断开连接',
                hideUpload: false
            },
            unbound: {
                title: '请先绑定电脑端插件',
                cls: 'unbound',
                progress: '0%',
                url: '',
                placeholder: '打开电脑端仓鼠快传，复制手机端链接或专属上传链接，粘贴到这里后即可从相册、微信、文件管理器原生分享传图。',
                btn: '绑定电脑端插件',
                hideUpload: false
            }
        };

        const phone = document.getElementById('phone');
        const uploadFrame = document.getElementById('uploadFrame');
        const uploadTitle = document.getElementById('uploadTitle');
        const progressFill = document.getElementById('progressFill');
        const urlBox = document.getElementById('urlBox');
        const bindBtn = document.getElementById('bindBtn');
        const pickerSheet = document.getElementById('pickerSheet');
        const pickerClose = document.getElementById('pickerClose');
        const pickerToggle = document.getElementById('pickerToggle');
        const buttons = Array.from(document.querySelectorAll('.state-btn[data-state]'));
        let pickerVisible = false;

        function renderState(name) {
            const state = states[name];
            phone.className = `phone ${state.cls}`.trim();
            uploadFrame.style.display = state.hideUpload ? 'none' : 'block';
            uploadTitle.textContent = state.title;
            progressFill.style.width = state.progress;
            urlBox.value = state.url;
            urlBox.placeholder = state.placeholder;
            bindBtn.textContent = state.btn;
            buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.state === name));
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', () => renderState(btn.dataset.state));
        });

        pickerToggle.addEventListener('click', () => {
            pickerVisible = !pickerVisible;
            pickerSheet.style.display = pickerVisible ? 'block' : 'none';
            pickerToggle.classList.toggle('active', pickerVisible);
        });

        pickerClose.addEventListener('click', () => {
            pickerVisible = false;
            pickerSheet.style.display = 'none';
            pickerToggle.classList.remove('active');
        });
    </script>
</body>
</html>
